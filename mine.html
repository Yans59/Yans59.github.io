<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minesweeper - galaxysl</title>

  <!-- 关键：适配移动端 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 防缓存（方便调试） -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 字体 -->
  <link href="https://fonts.googleapis.com/css?family=Space+Mono:400,700" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      text-align: center;
      background: #efefef;
      font-family: 'Space Mono', monospace;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    /* 导航栏 */
    .navbar {
      background: #333;
      padding: 10px;
    }
    .navbar a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    #grid {
      margin-top: 20px;
      display: inline-block;
    }

    .row {
      display: flex;
    }

    .cell {
      width: 24px;
      height: 24px;
      background: #d1d1d1;
      border: 2px solid #999;
      font-size: 14px;
      line-height: 24px;
      cursor: pointer;
    }

    .revealed {
      background: #eee;
      border: 1px solid #bbb;
    }

    .mine {
      background: red;
    }
  </style>
</head>

<body>

<!-- 导航栏 -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="game.html">Game</a>
</div>

<h1>💣 Minesweeper</h1>

<div id="grid"></div>

<script>
$(function () {
  const rows = 10;
  const cols = 10;
  const mines = 15;
  let grid = [];

  function init() {
    grid = [];
    $("#grid").empty();

    for (let r = 0; r < rows; r++) {
      let row = [];
      let rowDiv = $("<div class='row'></div>");

      for (let c = 0; c < cols; c++) {
        let cell = {
          mine: false,
          revealed: false,
          count: 0
        };

        let cellDiv = $("<div class='cell'></div>");
        cellDiv.data("pos", { r, c });

        rowDiv.append(cellDiv);
        row.push(cell);
      }

      $("#grid").append(rowDiv);
      grid.push(row);
    }

    placeMines();
    calculateNumbers();
  }

  function placeMines() {
    let placed = 0;
    while (placed < mines) {
      let r = Math.floor(Math.random() * rows);
      let c = Math.floor(Math.random() * cols);

      if (!grid[r][c].mine) {
        grid[r][c].mine = true;
        placed++;
      }
    }
  }

  function calculateNumbers() {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c].mine) continue;

        let count = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            let nr = r + dr;
            let nc = c + dc;

            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
              if (grid[nr][nc].mine) count++;
            }
          }
        }
        grid[r][c].count = count;
      }
    }
  }

  function reveal(r, c, cellDiv) {
    let cell = grid[r][c];
    if (cell.revealed) return;

    cell.revealed = true;
    cellDiv.addClass("revealed");

    if (cell.mine) {
      cellDiv.addClass("mine").text("💣");
      alert("Game Over!");
      init();
      return;
    }

    if (cell.count > 0) {
      cellDiv.text(cell.count);
    } else {
      cellDiv.text("");
      expand(r, c);
    }
  }

  function expand(r, c) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        let nr = r + dr;
        let nc = c + dc;

        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
          let div = $(".row").eq(nr).find(".cell").eq(nc);
          reveal(nr, nc, div);
        }
      }
    }
  }

  $(document).on("click", ".cell", function () {
    let pos = $(this).data("pos");
    reveal(pos.r, pos.c, $(this));
  });

  init();
});
</script>

</body>
</html>
