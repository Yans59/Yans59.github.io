<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Personal Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;       
      margin-top: 100px;        
      background-color: #f0f0f0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      justify-content: center;  
      gap: 20px;                
      flex-wrap: wrap;          
      margin-bottom: 20px;
    }
    .links a, .links .collapsible {
      font-size: 1.2em;
      text-decoration: none;    
      color: #000;              
      cursor: pointer;           
      transition: color 0.3s;
    }
    .links a:hover, .links .collapsible:hover {
      color: #bebada;           
    }

    /* About Me 上划线样式 */
    .collapsible {
      border-top: 2px solid #000;
      padding-top: 5px;
    }

    .content {
      display: none;             
      max-width: 600px;
      margin: 10px auto 40px;    /* 顶部和底部留白 */
      text-align: left;
      line-height: 1.5em;
    }

    .content a {
      color: #2a48ec;            
      text-decoration: underline;
    }

    .content a:hover {
      color: #1a30a0;
    }
  </style>
</head>
<body>
  <h1>Welcome to Shulan's Webpage!</h1>
  <p>This is my first page on GitHub Pages.</p>

  <div class="links">
    <a href="mine.html">Game 🎮</a>
    <a href="https://ui.adsabs.harvard.edu/user/libraries/-2Ha8WEIRyel8gvgfELjaA" target="_blank">My Papers</a>
    <span class="collapsible">About Me 👩‍💻</span>
  </div>

  <div class="content">
    <p>Hi, here is Shulan. I am a PhD student at Xiamen University. My interests are galaxy formation and evolution. My publications are <a href="https://ui.adsabs.harvard.edu/user/libraries/-2Ha8WEIRyel8gvgfELjaA" target="_blank">here</a>.</p>
    <p>Email: yansl[at]xmu.edu.cn 🚀</p>
  </div>

  <script>
    const collapsible = document.querySelector('.collapsible');
    const content = document.querySelector('.content');

    collapsible.addEventListener('click', () => {
      content.style.display = content.style.display === 'block' ? 'none' : 'block';
      if(content.style.display === 'block') {
        content.scrollIntoView({behavior: "smooth"});
      }
    });
  </script>
</body>
</html>
