<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Personal Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;       /* 整体居中 */
      margin-top: 100px;        /* 页面顶部留白 */
      background-color: #f0f0f0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      justify-content: center;  /* 水平居中 */
      gap: 20px;                /* 链接间距 */
      flex-wrap: wrap;          /* 小屏幕自动换行 */
    }
    .links a {
      font-size: 1.2em;
      text-decoration: none;    /* 去掉下划线 */
      color: #000;              /* 链接颜色 */
      cursor: pointer;
      transition: color 0.3s;
    }
    .links a:hover {
      color: #bebada;           /* 悬停颜色 */
    }
    .content {
      display: none;             /* 默认隐藏 */
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
      background-color: #fbb4ae;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      line-height: 1.5em;
    }

    .content a {
      color: #80b1d3;            /* 超链接颜色 */
      text-decoration: underline;
    }

    .content a:hover {
      color: #bebada;
    }
  </style>
</head>
<body>
  <h1>Welcome to Shulan's Webpage!</h1>
  <p>This is my first page on GitHub Pages.</p>

  <div class="links">
    <a href="mine.html"> Game🎮 </a>
    <a href="https://ui.adsabs.harvard.edu/user/libraries/-2Ha8WEIRyel8gvgfELjaA">My Papers</a>
    <span class="collapsible">About Me👩‍💻</span>
  </div>
  <div class="content">
    <h2>About Me</h2>
    <p>Hi, here is Shulan. I am a PhD student at Xiamen University. My interests are galaxy formation and evolution. My publications are <a href="https://ui.adsabs.harvard.edu/user/libraries/-2Ha8WEIRyel8gvgfELjaA" target="_blank"> here</a></p>.
    <p>Email: yansl[at]xmu.edu.cn🚀</p>
  </div>

  <script>
    const collapsible = document.querySelector('.collapsible');
    const content = document.querySelector('.content');

    collapsible.addEventListener('click', () => {
      if(content.style.display === 'block') {
        content.style.display = 'none';
      } else {
        content.style.display = 'block';
        content.scrollIntoView({behavior: "smooth"});
      }
    });
  </script>
</body>
</html>
