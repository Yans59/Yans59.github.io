<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Personal Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;       
      margin-top: 100px;        
      background-color: #ffffff;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      justify-content: center;  
      gap: 20px;                
      flex-wrap: wrap;          
      margin-bottom: 20px;
    }
    .links a, .links .collapsible {
      font-size: 1.2em;
      text-decoration: none;    
      color: #000;              
      cursor: pointer;           
      transition: color 0.3s;
    }
    .links a:hover, .links .collapsible:hover {
      color: #bebada;           
    }

    .content {
      display: none;             
      max-width: 600px;
      margin: 10px auto 40px;    
      text-align: left;
      line-height: 1.5em;
      border-top: 2px solid #000; /* 展开内容上方的上划线 */
      padding-top: 10px;          /* 上划线和文字间距 */
    }

    .content a {
      color: #2a48ec;            
      text-decoration: underline;
    }

    .content a:hover {
      color: #1a30a0;
    }
  </style>
</head>
<body>
  <h1>Congratulations! You find Shulan!</h1>
  <p>This is my personal webpage.</p>

  <div class="links">
    <a href="mine.html">Game 🎮</a>
    <a href="https://ui.adsabs.harvard.edu/user/libraries/-2Ha8WEIRyel8gvgfELjaA" target="_blank">Publications</a>
    <span class="collapsible">About Me 👩‍💻</span>
  </div>

  <div class="content">
    <p>Hi, here is Shulan Yan. My Chinese name is 鄢淑澜. I am a PhD student at Xiamen University. My interests are galaxy formation and evolution. My publications are <a href="https://ui.adsabs.harvard.edu/search/fq=%7B!type%3Daqp%20v%3D%24fq_database%7D&fq_database=database%3Aastronomy&q=%3Dauthor%3A(%22Yan%2C%20S%20L%22%20OR%20%22Yan%2C%20Shulan%22)%20AND%20pubdate%3A%5B2026-01%20TO%20*%5D&sort=date%20desc%2C%20bibcode%20desc&p_=0" target="_blank">here</a>.</p>
    <p>Email: yansl[at]stu.xmu.edu.cn 🚀</p>
  </div>

  <script>
    const collapsible = document.querySelector('.collapsible');
    const content = document.querySelector('.content');

    collapsible.addEventListener('click', () => {
      content.style.display = content.style.display === 'block' ? 'none' : 'block';
      if(content.style.display === 'block') {
        content.scrollIntoView({behavior: "smooth"});
      }
    });
  </script>
</body>
</html>
