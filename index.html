<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Personal Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;       /* 整体文字居中 */
      margin-top: 100px;        /* 页面顶部留白 */
      background-color: #f0f0f0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }
    .buttons {
      display: flex;
      justify-content: center;  /* 水平居中按钮 */
      gap: 20px;                /* 按钮间距 */
      flex-wrap: wrap;          /* 窗口小了自动换行 */
    }
    button {
      padding: 15px 25px;
      font-size: 1em;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
    a {
      text-decoration: none;  /* 去掉链接下划线 */
    }
  </style>
</head>
<body>
  <h1>Welcome to Shulan's Webpage!</h1>
  <p>This is my first page on GitHub Pages.</p>

  <div class="buttons">
    <a href="mine.html"><button>Game 🎮</button></a>
    <a href="https://ui.adsabs.harvard.edu/user/libraries/-2Ha8WEIRyel8gvgfELjaA"><button>My Papers</button></a>
  </div>
</body>
</html>
